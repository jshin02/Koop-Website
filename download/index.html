<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Koop</title>
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7F96FF;
            --primary-dark: #6a80e8;
            --primary-light: #f0f3ff;
            --secondary: #6BA786;
            --text-primary: #0a0e27;
            --text-secondary: #5f6b7a;
            --bg: #ffffff;
            --bg-alt: #f8f9fb;
            --border: #e4e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-primary);
            background: var(--bg);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Background decoration */
        body::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(127, 150, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(107, 167, 134, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 2rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .app-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .app-link {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(127, 150, 255, 0.3);
        }

        .app-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(127, 150, 255, 0.4);
        }

        .manual-links {
            display: none;
        }

        .manual-links.show {
            display: block;
        }

        .redirect-status {
            display: block;
        }

        .redirect-status.hide {
            display: none;
        }

        .back-link {
            margin-top: 2rem;
            display: inline-block;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Koop</div>

        <!-- Shown while auto-redirecting on mobile -->
        <div class="redirect-status" id="redirectStatus">
            <div class="spinner"></div>
            <h1>Taking you to your app store…</h1>
            <p>If nothing happens, choose your platform below.</p>
        </div>

        <!-- Shown on desktop or as fallback -->
        <div class="manual-links" id="manualLinks">
            <h1>Download Koop</h1>
            <p>Choose your platform to get started.</p>
        </div>

        <div class="app-links">
            <a href="https://apps.apple.com/us/app/koop-app/id6739431126" class="app-link" id="iosLink">Download on App Store</a>
            <a href="https://play.google.com/store/apps/details?id=com.penciv.koopapp" class="app-link" id="androidLink">Get on Google Play</a>
        </div>

        <a href="/" class="back-link">← Back to home</a>
    </div>

    <script>
        (function() {
            var iosUrl = "https://apps.apple.com/us/app/koop-app/id6739431126";
            var androidUrl = "https://play.google.com/store/apps/details?id=com.penciv.koopapp";

            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
            var isAndroid = /android/i.test(ua);

            var redirectStatus = document.getElementById('redirectStatus');
            var manualLinks = document.getElementById('manualLinks');

            if (isIOS) {
                // Redirect to App Store
                window.location.replace(iosUrl);
            } else if (isAndroid) {
                // Redirect to Google Play
                window.location.replace(androidUrl);
            } else {
                // Desktop or unknown — show both options, hide the redirect spinner
                redirectStatus.classList.add('hide');
                manualLinks.classList.add('show');
            }
        })();
    </script>
</body>
</html>
